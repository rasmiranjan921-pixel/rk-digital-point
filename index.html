<!DOCTYPE html>
<html>
<head>
<title>RK Digital Point - Ultra Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
}

.sidebar{
width:220px;
background:#111827;
height:100vh;
padding:20px;
box-shadow:2px 0 10px rgba(0,0,0,0.5);
}

.sidebar h2{
text-align:center;
color:#22c55e;
}

.sidebar button{
width:100%;
margin:10px 0;
padding:10px;
border:none;
border-radius:8px;
background:#1f2937;
color:white;
cursor:pointer;
}

.main{
flex:1;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 0 15px rgba(34,197,94,0.3);
}

input{
padding:8px;
margin:5px;
border:none;
border-radius:6px;
}

button.action{
background:#22c55e;
padding:8px 15px;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

.logout{
background:#ef4444;
}

.hidden{
display:none;
}

.service-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
}

.service{
background:#0f172a;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(124,58,237,0.4);
}
</style>
</head>
<body>

<div class="sidebar hidden" id="sidebar">
<h2>RK Digital</h2>
<button onclick="showDashboard()">Dashboard</button>
<button onclick="showServices()">Services</button>
<button onclick="logout()" class="logout">Logout</button>
</div>

<div class="main">

<div id="authSection" class="card">
<h3>Login / Register</h3>
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>
<button class="action" onclick="register()">Register</button>
<button class="action" onclick="login()">Login</button>
</div>

<div id="dashboard" class="hidden">
<div class="card">
<h3>Welcome 👋</h3>
<p>Wallet Balance: ₹ <span id="balance">0</span></p>
</div>
</div>

<div id="services" class="hidden">
<div class="card">
<h3>Services</h3>
<div class="service-grid">
<div class="service">PAN Details</div>
<div class="service">RC Details</div>
<div class="service">GST Check</div>
<div class="service">IFSC Finder</div>
<div class="service">Vehicle Info</div>
<div class="service">Recharge</div>
</div>
</div>
</div>

<div id="adminPanel" class="hidden">
<div class="card">
<h3>👑 Admin Panel</h3>
<input type="text" id="userId" placeholder="User UID">
<input type="number" id="amount" placeholder="Amount">
<button class="action" onclick="addBalance()">Add Balance</button>
</div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDQAqC4QRce06nq5z5azcY-FjaO2kaINb8",
authDomain: "rk-digital-point.firebaseapp.com",
projectId: "rk-digital-point",
storageBucket: "rk-digital-point.firebasestorage.app",
messagingSenderId: "40824483011",
appId: "1:40824483011:web:c6bcb6a412dc7583cb4676"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

const adminEmail="rkdigitalpoint3@gmail.com";

window.register=async()=>{
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;
const user=await createUserWithEmailAndPassword(auth,email,password);
await setDoc(doc(db,"users",user.user.uid),{balance:0});
alert("Registered");
}

window.login=async()=>{
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;
await signInWithEmailAndPassword(auth,email,password);
}

window.logout=async()=>{
await signOut(auth);
}

window.addBalance=async()=>{
const uid=document.getElementById("userId").value;
const amt=parseInt(document.getElementById("amount").value);
const ref=doc(db,"users",uid);
const snap=await getDoc(ref);
if(snap.exists()){
await updateDoc(ref,{balance:snap.data().balance+amt});
alert("Balance Added");
}
}

window.showDashboard=()=>{
document.getElementById("dashboard").classList.remove("hidden");
document.getElementById("services").classList.add("hidden");
}

window.showServices=()=>{
document.getElementById("services").classList.remove("hidden");
document.getElementById("dashboard").classList.add("hidden");
}

onAuthStateChanged(auth,async(user)=>{
if(user){
document.getElementById("authSection").classList.add("hidden");
document.getElementById("sidebar").classList.remove("hidden");

if(user.email===adminEmail){
document.getElementById("adminPanel").classList.remove("hidden");
}else{
document.getElementById("dashboard").classList.remove("hidden");
const ref=doc(db,"users",user.uid);
const snap=await getDoc(ref);
if(snap.exists()){
document.getElementById("balance").innerText=snap.data().balance;
}
}
}else{
document.getElementById("authSection").classList.remove("hidden");
document.getElementById("sidebar").classList.add("hidden");
}
});
</script>

</body>
</html>
